name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.9.49)"
        required: true
        type: string

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: python
        run: |
          import re, os, sys

          tag = os.environ["TAG_NAME"]
          version = tag.lstrip("v")

          changelog = open("CHANGELOG.md", encoding="utf-8").read()

          pattern = rf"(^#\s+v{re.escape(version)}\b.*?)(?=^#\s+v|\Z)"
          match = re.search(pattern, changelog, re.MULTILINE | re.DOTALL)

          if match:
              body = match.group(1).strip()
          else:
              body = f"Release {tag}"

          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(body)

          print(f"Extracted {len(body)} chars for {tag}")
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}

      - name: Determine pre-release flag
        id: prerelease
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if [[ "$TAG" == *"-beta"* || "$TAG" == *"-alpha"* || "$TAG" == *"-rc"* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes only"
            gh release edit "$TAG" \
              --title "ApricotPlayer $TAG" \
              --notes-file release_notes.md
          else
            gh release create "$TAG" \
              --title "ApricotPlayer $TAG" \
              --notes-file release_notes.md \
              ${{ steps.prerelease.outputs.flag }}
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Windows Installer and Portable ZIP
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies and PyInstaller
        run: pip install -r requirements.txt pyinstaller

      - name: Download mpv (shinchiro latest x86_64)
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept        = "application/vnd.github+json"
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" -Headers $headers
          # Prefer plain x86_64 7z (not bootstrapper, not x86_64-v3)
          $asset = $release.assets |
            Where-Object { $_.name -match '^mpv-x86_64-\d{8}-git-[0-9a-f]+\.7z$' } |
            Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets |
              Where-Object { $_.name -match 'x86_64' -and $_.name -match '\.7z$' } |
              Select-Object -First 1
          }
          if (-not $asset) { throw "Could not find mpv x86_64 release asset" }
          Write-Host "Downloading mpv asset: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv.7z -Headers $headers
          & "C:\Program Files\7-Zip\7z.exe" x mpv.7z -o"mpv_extracted" -y | Out-Null
          $innerDir = Get-ChildItem -Path mpv_extracted -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path vendor\mpv | Out-Null
          Copy-Item -Path "$($innerDir.FullName)\*" -Destination vendor\mpv\ -Force
          Write-Host "mpv installed. Files in vendor\mpv:"
          Get-ChildItem vendor\mpv -Name
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ffmpeg (BtbN latest win64 GPL)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted -Force
          $ffmpegExe = Get-ChildItem -Path ffmpeg_extracted -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe not found in archive" }
          New-Item -ItemType Directory -Force -Path vendor\ffmpeg | Out-Null
          Copy-Item -Path $ffmpegExe.FullName -Destination vendor\ffmpeg\ffmpeg.exe -Force
          Write-Host "ffmpeg.exe placed in vendor\ffmpeg"

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: Build installer and portable ZIP
        shell: pwsh
        run: .\scripts\build_release.ps1

      - name: Upload assets to GitHub Release
        shell: pwsh
        run: |
          gh release upload "${{ steps.tag.outputs.name }}" `
            release-dist\ApricotPlayerSetup.exe `
            release-dist\ApricotPlayer.zip `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
